name: Maven Build and Test

on:
  workflow_dispatch:
    inputs:
      source_folder:
        description: 'Source folder containing Maven project'
        required: false
        default: 'code'
  push:
    branches: [ main ]
    paths:
      - 'code/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'code/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Display Maven version
        run: mvn --version
      
      - name: Build with Maven
        working-directory: ${{ github.event.inputs.source_folder || 'code' }}
        run: mvn clean install -DskipTests
      
      - name: Run tests
        working-directory: ${{ github.event.inputs.source_folder || 'code' }}
        run: mvn test
      
      - name: Verify and generate coverage report
        working-directory: ${{ github.event.inputs.source_folder || 'code' }}
        run: mvn verify
      
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: ${{ github.event.inputs.source_folder || 'code' }}/target/site/jacoco/
          retention-days: 30
      
      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs
          path: ${{ github.event.inputs.source_folder || 'code' }}/target/surefire-reports/
          retention-days: 30
      
      - name: Build summary
        if: always()
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Source Folder:** ${{ github.event.inputs.source_folder || 'code' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Java Version:** 11" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY