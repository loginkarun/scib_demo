name: Maven Build and Test

on:
  workflow_dispatch:
    inputs:
      source_folder:
        description: 'Source folder to build from'
        required: false
        default: 'code'
        type: string
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Determine source folder
      id: source
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "folder=${{ github.event.inputs.source_folder }}" >> $GITHUB_OUTPUT
        else
          echo "folder=code" >> $GITHUB_OUTPUT
        fi
        
    - name: Build with Maven
      working-directory: ${{ steps.source.outputs.folder }}
      run: |
        if [ -f "pom.xml" ]; then
          mvn clean install -DskipTests=false
        else
          echo "No pom.xml found in ${{ steps.source.outputs.folder }}"
          exit 1
        fi
        
    - name: Run tests
      working-directory: ${{ steps.source.outputs.folder }}
      run: mvn test
      
    - name: Generate JaCoCo report
      working-directory: ${{ steps.source.outputs.folder }}
      run: mvn jacoco:report
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          ${{ steps.source.outputs.folder }}/target/*.jar
          ${{ steps.source.outputs.folder }}/target/site/jacoco/
        retention-days: 7
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ${{ steps.source.outputs.folder }}/target/surefire-reports/
        retention-days: 7