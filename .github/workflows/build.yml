name: Build

on:
  workflow_dispatch:
    inputs:
      source_folder:
        description: 'Source folder to build from'
        required: false
        default: 'code'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Build with Maven
        run: |
          cd ${{ github.event.inputs.source_folder || 'code' }}
          mvn clean verify
        
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: build-logs
          path: |
            ${{ github.event.inputs.source_folder || 'code' }}/target/surefire-reports/
            ${{ github.event.inputs.source_folder || 'code' }}/target/*.jar
          retention-days: 7